app:
  env: local
  host: 0.0.0.0
  port: 8090
  workflow_timeout_seconds: 60
  workflow_timeout_buffer_seconds: 30
  model_node_timeout_buffer_seconds: 15

kafka:
  bootstrap_servers: 127.0.0.1:19092
  consumer_group: python-ai-engine-group
  topics:
    dispatch: ai.task.dispatch
    status: ai.task.status
    result: ai.task.result
    audit: ai.task.audit

redis:
  host: 127.0.0.1
  port: 6379
  db: 0

services:
  ai_orchestrator_base_url: http://127.0.0.1:8082
  request_timeout_seconds: 5
  user_id: ai-engine
  user_role: ADMIN

model:
  enabled: false
  provider: openai-compatible
  base_url: http://127.0.0.1:11434/v1
  api_key: local-dev-key
  model: qwen2.5:7b-instruct
  request_timeout_seconds: 20
  temperature: 0.2
  max_tokens: 1200
